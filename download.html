<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFOXAPP | Загрузка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #0B101E; --bg-2: #1A1F3A; --bg-3: #2D1B4E;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(14px);
            --accent-blue: #00E5FF; --accent-purple: #8A2BE2;
            --accent-green: #4CAF50;
            --text-main: #FFFFFF; --text-sec: rgba(255, 255, 255, 0.65);
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
            background-attachment: fixed; color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .glass {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25); transition: 0.3s;
        }
        .download-container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 10px; background: linear-gradient(90deg, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-sec); margin-bottom: 30px; }

        /* PROGRESS BAR */
        .progress-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); border-radius: 4px; transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .status-text { font-size: 13px; color: var(--text-sec); font-family: 'Roboto Mono', monospace; margin-bottom: 30px; }

        /* BUTTONS & INSTRUCTIONS */
        .btn-dl {
            display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 700; color: #000;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 14px; text-decoration: none; cursor: pointer; border: none; margin-bottom: 24px;
            box-shadow: 0 0 15px rgba(0,229,255,0.2); transition: 0.3s;
        }
        .btn-dl:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0,229,255,0.4); }
        .instructions { padding: 20px; text-align: left; }
        .instructions h3 { margin-bottom: 12px; font-size: 15px; color: var(--accent-green); }
        .instructions ol { padding-left: 20px; color: var(--text-sec); line-height: 1.6; font-size: 14px; }
        .instructions li { margin-bottom: 6px; }
        .inst-icon { color: var(--accent-blue); margin-right: 6px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.2s; } .delay-2 { animation-delay: 0.4s; } .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="download-container fade-in">
        <div style="margin-bottom: 24px;"><i class="fa-solid fa-cloud-arrow-down" style="font-size: 48px; color: var(--accent-blue);"></i></div>
        <h1 class="fade-in delay-1">Загрузка пакета</h1>
        <p class="fade-in delay-1">Подготовка файла для вашего устройства...</p>

        <div class="progress-wrap fade-in delay-1">
            <div class="progress-bar" id="progBar"></div>
        </div>
        <div class="status-text fade-in delay-2" id="statusText">Ожидание сервера...</div>

        <a href="NFOXAPP.apk" download="NFOXAPP.apk" class="btn-dl fade-in delay-2" id="dlBtn">
            <i class="fa-solid fa-download"></i> СКАЧАТЬ APK (Прямая ссылка)
        </a>

        <div class="glass instructions fade-in delay-3">
            <h3><i class="fa-solid fa-circle-info"></i> Как установить?</h3>
            <ol>
                <li><i class="inst-icon fa-solid fa-1"></i> Скачайте файл на устройство.</li>
                <li><i class="inst-icon fa-solid fa-2"></i> Разрешите установку из «Неизвестных источников» в настройках.</li>
                <li><i class="inst-icon fa-solid fa-3"></i> Запустите файл и следуйте инструкциям установщика.</li>
            </ol>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progBar');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('dlBtn');

            // Симуляция подготовки (3 сек)
            setTimeout(() => {
                text.textContent = 'Компиляция пакета... [████████░░]';
                bar.style.width = '100%';
            }, 500);

            // Автозапуск скачивания
            setTimeout(() => {
                text.textContent = '✅ Файл готов! Загрузка началась автоматически.';
                text.style.color = '#4CAF50';
                
                // Программный клик по ссылке
                if (btn && !btn.disabled) {
                    // Создаем временную ссылку для гарантированного триггера
                    const a = document.createElement('a');
                    a.href = btn.href;
                    a.download = 'NFOXAPP_v1.0.apk';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }, 3200);
        });
    </script>
</body>
</html>
